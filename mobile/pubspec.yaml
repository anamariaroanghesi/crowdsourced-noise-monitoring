name: noise_monitor
description: Crowdsourced noise pollution monitoring for Bucharest
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  # HTTP
  http: ^1.2.1
  # Secure storage for JWT
  flutter_secure_storage: ^9.0.0
  # Location / GPS
  geolocator: ^12.0.0
  # Noise / microphone dB measurement
  noise_meter: ^6.0.1
  # Permissions
  permission_handler: ^11.3.1
  # Local SQLite for offline queue
  sqflite: ^2.3.3
  path: ^1.9.0
  path_provider: ^2.1.3
  # Device info
  device_info_plus: ^10.1.0
  package_info_plus: ^8.0.0
  # State management
  provider: ^6.1.2
  # Connectivity check
  connectivity_plus: ^6.0.3
  # UUID generation
  uuid: ^4.4.0
  # Date formatting
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
